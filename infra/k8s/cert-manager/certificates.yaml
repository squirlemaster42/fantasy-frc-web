---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fantasy-frc-tls
  namespace: fantasy-frc
spec:
  secretName: fantasy-frc-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - ${FANTASY_FRC_DOMAIN}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - ${VAULT_DOMAIN}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - ${GRAFANA_DOMAIN}
