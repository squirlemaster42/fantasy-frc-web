apiVersion: apps/v1
kind: Deployment
metadata:
  name: fantasy-frc-web
  namespace: fantasy-frc
  labels:
    app: fantasy-frc-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fantasy-frc-web
  template:
    metadata:
      labels:
        app: fantasy-frc-web
    spec:
      containers:
        - name: web
          image: ${REGISTRY_HOST}:${REGISTRY_PORT}/fantasy-frc-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: fantasy-frc-app-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fantasy-frc-web
  namespace: fantasy-frc
spec:
  type: ClusterIP
  selector:
    app: fantasy-frc-web
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fantasy-frc-web
  namespace: fantasy-frc
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${FANTASY_FRC_DOMAIN}
      secretName: fantasy-frc-tls
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fantasy-frc-web
                port:
                  number: 80
