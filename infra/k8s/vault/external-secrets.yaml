---
# Sync Postgres password from Vault to the database namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: database
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/database/postgres
        property: password
---
# Sync Grafana admin password from Vault to the monitoring namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: kube-prometheus-stack-grafana
    creationPolicy: Merge
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/data/monitoring/grafana
        property: admin-password
