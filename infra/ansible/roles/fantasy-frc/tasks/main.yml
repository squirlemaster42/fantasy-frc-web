---
- name: Ensure fantasy-frc namespace exists
  shell: |
    kubectl create namespace {{ fantasy_frc_namespace }} --dry-run=client -o yaml | kubectl apply -f -

- name: Render ExternalSecret
  template:
    src: external-secret.yaml.j2
    dest: /tmp/fantasy-frc-external-secret.yaml
    mode: '0644'

- name: Apply ExternalSecret
  shell: |
    kubectl apply -f /tmp/fantasy-frc-external-secret.yaml

- name: Force ExternalSecret to refresh from Vault
  shell: |
    kubectl annotate externalsecret/fantasy-frc-app-secret -n {{ fantasy_frc_namespace }} force-sync="$(date +%s)" --overwrite

- name: Wait for ExternalSecret to sync
  shell: |
    kubectl wait --for=condition=Ready externalsecret/fantasy-frc-app-secret -n {{ fantasy_frc_namespace }} --timeout=120s

- name: Remove existing migration job
  shell: |
    kubectl delete job fantasy-frc-migrate -n {{ fantasy_frc_namespace }} --ignore-not-found=true

- name: Render migration job manifest
  template:
    src: migrate-job.yaml.j2
    dest: /tmp/fantasy-frc-migrate-job.yaml
    mode: '0644'

- name: Apply migration job
  shell: |
    kubectl apply -f /tmp/fantasy-frc-migrate-job.yaml

- name: Wait for migration job to complete
  shell: |
    kubectl wait --for=condition=complete job/fantasy-frc-migrate -n {{ fantasy_frc_namespace }} --timeout=180s

- name: Render Fantasy FRC application manifest
  template:
    src: app.yaml.j2
    dest: /tmp/fantasy-frc-app.yaml
    mode: '0644'

- name: Deploy Fantasy FRC web application
  shell: |
    kubectl apply -f /tmp/fantasy-frc-app.yaml

- name: Wait for Fantasy FRC deployment rollout
  shell: |
    kubectl rollout status deployment/fantasy-frc-web -n {{ fantasy_frc_namespace }} --timeout=180s

- name: Post-deploy smoke test
  shell: |
    curl -sfk --resolve {{ fantasy_frc_domain }}:{{ ingress_https_port }}:{{ api_vip }} \
      https://{{ fantasy_frc_domain }}:{{ ingress_https_port }}/healthz
  register: smoke_test
  retries: 6
  delay: 5
  until: smoke_test.rc == 0

- name: Render PodDisruptionBudget manifest
  template:
    src: pdb.yaml.j2
    dest: /tmp/fantasy-frc-pdb.yaml
    mode: '0644'

- name: Apply PodDisruptionBudget
  shell: |
    kubectl apply -f /tmp/fantasy-frc-pdb.yaml
