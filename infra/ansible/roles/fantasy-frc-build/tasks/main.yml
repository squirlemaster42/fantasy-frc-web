---
- name: Check if buildkit is installed
  shell: |
    command -v buildctl >/dev/null 2>&1 && command -v buildkitd >/dev/null 2>&1 && echo "installed" || echo "missing"
  register: buildkit_check
  changed_when: false
  become: yes

- name: Download and install buildkit
  shell: |
    set -eu
    BUILDKIT_VERSION="{{ buildkit_version }}"
    ARCH="$(uname -m)"
    case "$ARCH" in
      x86_64) ARCH=amd64 ;;
      aarch64) ARCH=arm64 ;;
    esac
    TMPDIR="$(mktemp -d)"
    cd "$TMPDIR"
    curl -fsSL "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-${ARCH}.tar.gz" -o buildkit.tar.gz
    tar -xzf buildkit.tar.gz
    cp bin/buildctl bin/buildkitd /usr/local/bin/
    chmod +x /usr/local/bin/buildctl /usr/local/bin/buildkitd
    rm -rf "$TMPDIR"
  args:
    executable: /bin/bash
  when: buildkit_check.stdout == "missing"
  become: yes

- name: Create buildkitd systemd service
  copy:
    dest: /etc/systemd/system/buildkitd.service
    content: |
      [Unit]
      Description=BuildKit Daemon
      Documentation=https://github.com/moby/buildkit
      After=containerd.service

      [Service]
      ExecStart=/usr/local/bin/buildkitd --addr=unix:///run/buildkit/buildkitd.sock
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  become: yes

- name: Start and enable buildkitd
  systemd:
    name: buildkitd
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Detect nerdctl path on target node
  shell: |
    command -v nerdctl || echo "{{ nerdctl_path }}"
  register: nerdctl_detected
  changed_when: false

- name: Set detected nerdctl path fact
  set_fact:
    nerdctl_path: "{{ nerdctl_detected.stdout_lines[-1] }}"

- name: Check if web image already exists in containerd
  shell: |
    ctr -n k8s.io images check "name=={{ web_image_name }}:{{ web_image_tag }}" | grep -q "{{ web_image_name }}:{{ web_image_tag }}" && echo "exists" || echo "missing"
  register: web_image_check
  changed_when: false
  become: yes

- name: Remove existing web image when force_build is true
  shell: |
    ctr -n k8s.io images rm {{ web_image_name }}:{{ web_image_tag }} || true
    ctr -n k8s.io images rm {{ web_image_name }}:latest || true
  when:
    - force_build | bool
    - web_image_check.stdout == "exists"
  become: yes

- name: Build Fantasy FRC web image
  shell: |
    {{ nerdctl_path }} -n k8s.io build \
      -t {{ web_image_name }}:{{ web_image_tag }} \
      -t {{ web_image_name }}:latest \
      {{ project_dir }}/server
  when:
    - build_images | bool or force_build | bool or web_image_check.stdout == "missing"
  timeout: 600
  become: yes

- name: Check if migrations image already exists in containerd
  shell: |
    ctr -n k8s.io images check "name=={{ migrations_image_name }}:{{ migrations_image_tag }}" | grep -q "{{ migrations_image_name }}:{{ migrations_image_tag }}" && echo "exists" || echo "missing"
  register: migrations_image_check
  changed_when: false
  become: yes

- name: Remove existing migrations image when force_build is true
  shell: |
    ctr -n k8s.io images rm {{ migrations_image_name }}:{{ migrations_image_tag }} || true
    ctr -n k8s.io images rm {{ migrations_image_name }}:latest || true
  when:
    - force_build | bool
    - migrations_image_check.stdout == "exists"
  become: yes

- name: Build Fantasy FRC migrations image
  shell: |
    {{ nerdctl_path }} -n k8s.io build \
      -t {{ migrations_image_name }}:{{ migrations_image_tag }} \
      -t {{ migrations_image_name }}:latest \
      {{ project_dir }}/database
  when:
    - build_images | bool or force_build | bool or migrations_image_check.stdout == "missing"
  timeout: 300
  become: yes

- name: Verify web image exists
  shell: |
    ctr -n k8s.io images check "name=={{ web_image_name }}:{{ web_image_tag }}" | grep "{{ web_image_name }}:{{ web_image_tag }}"
  changed_when: false
  become: yes

- name: Verify migrations image exists
  shell: |
    ctr -n k8s.io images check "name=={{ migrations_image_name }}:{{ migrations_image_tag }}" | grep "{{ migrations_image_name }}:{{ migrations_image_tag }}"
  changed_when: false
  become: yes
