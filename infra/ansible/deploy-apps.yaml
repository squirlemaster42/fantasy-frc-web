---
# Deploy the Fantasy FRC application stack on a running Kubernetes cluster.
# Run after site.yaml has provisioned the cluster.

- name: Deploy core application infrastructure
  hosts: control_plane[0]
  become: no
  environment:
    KUBECONFIG: "/home/{{ regular_user }}/.kube/config"
  roles:
    - ingress-nginx
    - cert-manager
    - postgres
    - redis
    - vault
    - monitoring
    - fantasy-frc
