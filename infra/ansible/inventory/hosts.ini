; Single-node validation inventory
; For full HA, add 2 more control-plane nodes and any workers.

[control_plane]
cp1 ansible_host=192.168.1.164 ansible_connection=local

[workers]

[k8s:children]
control_plane
workers

[all:vars]
ansible_user=jmisbach
ansible_ssh_private_key_file=~/.ssh/id_rsa
