---
- name: Deploy Fantasy FRC
  hosts: fantasy_frc_servers
  become: yes
  vars_files:
    - vars/main.yml
  
  tasks:
    - name: Install system dependencies
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - redis-server
          - curl
        state: present
        update_cache: yes

    - name: Create fantasyfrc user
      user:
        name: fantasyfrc
        system: yes
        shell: /bin/false
        home: /opt/fantasy-frc
        create_home: yes

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: fantasyfrc
        group: fantasyfrc
        mode: '0755'
      loop:
        - /opt/fantasy-frc
        - /opt/fantasy-frc/bin
        - /opt/fantasy-frc/config
        - /opt/fantasy-frc/migrations
        - /var/log/fantasy-frc

    - name: Copy binary to server
      copy:
        src: "{{ local_binary_path }}"
        dest: /opt/fantasy-frc/bin/server
        owner: fantasyfrc
        group: fantasyfrc
        mode: '0755'
      notify: restart fantasy-frc

    - name: Copy migrations to server
      copy:
        src: "{{ local_migrations_path }}"
        dest: /opt/fantasy-frc/migrations/
        owner: fantasyfrc
        group: fantasyfrc
        mode: '0644'

    - name: Deploy environment file
      template:
        src: templates/.env.j2
        dest: /opt/fantasy-frc/config/.env
        owner: fantasyfrc
        group: fantasyfrc
        mode: '0600'
      notify: restart fantasy-frc

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create PostgreSQL database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        state: present

    - name: Create PostgreSQL user
      become_user: postgres
      postgresql_user:
        db: "{{ db_name }}"
        name: "{{ db_username }}"
        password: "{{ db_password }}"
        priv: "ALL"
        state: present

    - name: Grant database privileges
      become_user: postgres
      postgresql_privs:
        db: "{{ db_name }}"
        role: "{{ db_username }}"
        objs: ALL_IN_SCHEMA
        privs: ALL
        type: table

    - name: Run database migrations
      shell: |
        export PGPASSWORD="{{ db_password }}"
        for migration in /opt/fantasy-frc/migrations/*.up.sql; do
          psql -h localhost -U {{ db_username }} -d {{ db_name }} -f "$migration" || true
        done
      register: migration_result
      changed_when: "'INSERT' in migration_result.stdout or 'UPDATE' in migration_result.stdout or 'CREATE' in migration_result.stdout"

    - name: Create TBA webhook secret file
      copy:
        content: "{{ tba_webhook_secret }}"
        dest: /opt/fantasy-frc/config/tba_webhook_secret.txt
        owner: fantasyfrc
        group: fantasyfrc
        mode: '0600'
      when: tba_webhook_secret is defined

    - name: Ensure Redis is running
      service:
        name: redis-server
        state: started
        enabled: yes

    - name: Deploy systemd service
      template:
        src: templates/fantasy-frc.service.j2
        dest: /etc/systemd/system/fantasy-frc.service
        owner: root
        group: root
        mode: '0644'
      notify: 
        - reload systemd
        - restart fantasy-frc

    - name: Enable and start Fantasy FRC service
      systemd:
        name: fantasy-frc
        state: started
        enabled: yes
        daemon_reload: yes

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart fantasy-frc
      systemd:
        name: fantasy-frc
        state: restarted
