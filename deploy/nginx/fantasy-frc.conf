# Reference Nginx reverse proxy configuration for Fantasy FRC
# Copy this to /etc/nginx/sites-available/fantasy-frc.conf and symlink to sites-enabled
#
# The Go app listens on port 8080 (plain HTTP).
# Nginx handles TLS termination, security headers, and static asset caching.

upstream fantasy_frc {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP to HTTPS (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://fantasy_frc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

